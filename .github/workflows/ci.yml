name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      BETTER_AUTH_SECRET: "ci-better-auth-secret"
      BETTER_AUTH_URL: "https://ci.example.com"
      BETTER_AUTH_GOOGLE_CLIENT_ID: "ci-google-client-id"
      BETTER_AUTH_GOOGLE_CLIENT_SECRET: "ci-google-client-secret"
      CORSAIR_KEK: "ci-corsair-kek"
      CORSAIR_WEBHOOK_TOKEN: "ci-corsair-webhook-token"
      CRON_SECRET: "ci-cron-secret"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/superg"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Cloudflare build
        env:
          SKIP_ENV_VALIDATION: "1"
        run: bun run cf:build
